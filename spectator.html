<!DOCTYPE html>
<html>
<head>
<title>Live Leaderboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#0d47a1;
color:white;
margin:0;
padding:10px;
text-align:center;
}

h1{
margin:10px 0;
font-size:20px;
}

.card{
background:rgba(255,255,255,0.12);
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:500px;
}

.leader{
background:rgba(255,255,255,0.25);
}

.small{
font-size:12px;
opacity:0.85;
}
</style>
</head>

<body>

<h1>⛳ Live Leaderboard</h1>
<div id="title">Loading tournament...</div>

<div class="card">
<div id="board">Loading...</div>
</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiPxqKG7ZWEpfZA-PPAfBF2ov2YLdH2KQ",
 authDomain: "golf-tournament123.firebaseapp.com",
 projectId: "golf-tournament123",
 storageBucket: "golf-tournament123.firebasestorage.app",
 messagingSenderId: "1090785165873",
 appId: "1:1090785165873:web:d1db71353eaa39ebb5cb10"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = {};

function total(scores){
return (scores||[]).reduce((a,b)=>a+b,0);
}

db.collection("tournament").doc("main")
.onSnapshot(doc=>{

if(doc.exists) data = doc.data();

document.getElementById("title").innerText =
data.tournamentName || "Tournament";

render();
});

function render(){

let list = [];

(data.groups||[]).forEach(g=>{
(g.players||[]).forEach(p=>{
list.push({
name:p.name,
score:total(p.scores)
});
});
});

list.sort((a,b)=>a.score-b.score);

let html="";

list.forEach((p,i)=>{

let medal = (i+1)+".";
if(i===0) medal="🥇";
if(i===1) medal="🥈";
if(i===2) medal="🥉";

html+=`
<div class="${i===0?'leader':''}" style="padding:8px;margin:5px;border-radius:8px;">
${medal} ${p.name} — ${p.score}
</div>
`;
});

document.getElementById("board").innerHTML=html;

}

</script>

</body>
</html>

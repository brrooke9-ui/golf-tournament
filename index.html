<!DOCTYPE html>
<html>
<head>
<title>Golf Tournament</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#1565c0;
color:white;
margin:0;
padding:8px;
}

h1{
text-align:center;
margin:8px 0;
font-size:18px;
}

.card{
background:rgba(0,0,0,0.25);
margin:8px 0;
padding:8px;
border-radius:10px;
}

.player{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.12);
padding:6px;
margin:6px 0;
border-radius:8px;
flex-wrap:wrap;
}

.name{
font-weight:bold;
font-size:14px;
}

.small{
font-size:11px;
opacity:0.85;
}

select{
padding:4px;
font-size:13px;
border-radius:6px;
border:none;
margin:2px;
max-width:75px;
}

button{
padding:5px 8px;
border:none;
border-radius:6px;
background:#ffcc00;
font-weight:bold;
font-size:12px;
}

.leader{
background:rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<h1>⛳ Tournament</h1>
<h2 id="title">Loading...</h2>

<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard">Loading...</div>
</div>

<div id="board">Loading players...</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiPxqKG7ZWEpfZA-PPAfBF2ov2YLdH2KQ",
 authDomain: "golf-tournament123.firebaseapp.com",
 projectId: "golf-tournament123",
 storageBucket: "golf-tournament123.firebasestorage.app",
 messagingSenderId: "1090785165873",
 appId: "1:1090785165873:web:d1db71353eaa39ebb5cb10"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = {};

db.collection("tournament").doc("main")
.onSnapshot(doc=>{
if(doc.exists) data = doc.data();

document.getElementById("title").innerText =
data.tournamentName || "Tournament";

render();
});

function save(){
db.collection("tournament").doc("main").set(data);
}

function total(scores){
return (scores||[]).reduce((a,b)=>a+b,0);
}

function lockedCount(p){
return (p.lockedHoles||[]).filter(x=>x).length;
}

function updateScore(g,p,h,val){

let player = data.groups[g].players[p];

if(!player.scores) player.scores=[];

player.scores[h] = Number(val);

save();
}

function lockHole(g,p,h){

let player = data.groups[g].players[p];

if(!player.lockedHoles) player.lockedHoles=[];

player.lockedHoles[h] = true;

save();
}

function submit(g,p){

let hole=document.getElementById(`hole-${g}-${p}`).value;
let score=document.getElementById(`score-${g}-${p}`).value;

if(hole===""||score==="") return;

let player=data.groups[g].players[p];

if(!player.lockedHoles) player.lockedHoles=[];

if(player.lockedHoles[hole]){
alert("Hole already locked!");
return;
}

updateScore(g,p,hole,score);
lockHole(g,p,hole);
}

function renderLeaderboard(){

let list=[];

(data.groups||[]).forEach(g=>{
(g.players||[]).forEach(p=>{
list.push({
name:p.name,
score:total(p.scores),
locked:lockedCount(p),
holes:(data.holes||[]).length
});
});
});

list.sort((a,b)=>a.score-b.score);

let html="";

list.forEach((p,i)=>{

let medal = (i+1)+".";
if(i===0) medal="🥇";
if(i===1) medal="🥈";
if(i===2) medal="🥉";

html+=`
<div class="${i===0?'leader':''}" style="padding:6px;">
${medal} ${p.name} — ${p.score}
<br>
<span class="small">🔒 ${p.locked}/${p.holes}</span>
</div>
`;
});

document.getElementById("leaderboard").innerHTML=html;
}

function render(){

renderLeaderboard();

let html="";

(data.groups||[]).forEach((g,gi)=>{

html+=`<div class="card"><h3>${g.name}</h3>`;

(g.players||[]).forEach((p,pi)=>{

html+=`
<div class="player">
<div>
<div class="name">${p.name} (${total(p.scores)})</div>
<div class="small">🔒 ${lockedCount(p)}/${(data.holes||[]).length}</div>
</div>

<div>
<select id="hole-${gi}-${pi}">
<option value="">Hole</option>
`;

(data.holes||[]).forEach((h,hi)=>{
html+=`<option value="${hi}">${hi+1}</option>`;
});

html+=`
</select>

<select id="score-${gi}-${pi}">
<option value="">Score</option>
`;

for(let i=1;i<=12;i++){
html+=`<option value="${i}">${i}</option>`;
}

html+=`
</select>

<button onclick="submit(${gi},${pi})">Enter</button>
</div>
</div>
`;
});

html+=`</div>`;
});

document.getElementById("board").innerHTML=html;

}

</script>

</body>
</html>
